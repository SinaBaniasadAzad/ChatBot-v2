# ============================================================================
#  Taxonomy — تعریف دسته‌ها (منبع واحد حقیقت)
# ----------------------------------------------------------------------------
#  افزودن دستهٔ جدید = افزودن یک بلوک label اینجا. هیچ تغییری در کد لازم نیست.
#
#  هر «layer» یک بُعد دسته‌بندی است. هر «label» یک گزینه در آن بُعد.
#  - id    : slug پایدار و یکتا (مدل همین را برمی‌گرداند، نه نام نمایشی)
#  - name  : نام نمایشی
#  - definition : تعریف دقیق (به مدل تزریق می‌شود)
#  - cues  : کلمات/عبارات نشانه‌ای (فارسی و انگلیسی). فقط «راهنما» هستند، نه قانون قطعی.
# ============================================================================

meta:
  languages: [fa, en]
  notes: "Layer ids are JSON keys in the model output. Label ids are stable slugs."

layers:
  # -------------------------------------------------------------------------
  - id: layer1
    name: "Type / نوع درخواست"
    role: intent
    description: >
      قصد کاربر را مشخص می‌کند: آیا چیزی که قبلاً کار می‌کرد خراب/مختل شده (Incident)،
      یا کاربر چیز جدید/دسترسی/قابلیتی می‌خواهد که تا کنون نداشته (Service Request).
      این لایه مستقل از حوزه (Domain) است.
    labels:
      - id: incident
        name: "Incident"
        definition: >
          یک مشکل پیش‌آمده: خطا، کرش، رفتار غیرمنتظره، افت عملکرد، یا چیزی که قبلاً
          درست کار می‌کرد و حالا مشکل دارد.
        cues: [خطا, error, کرش, crash, "عدم ثبت", "ثبت نشده", "کار نمی‌کند", مشکل, اشکال, "به درستی ثبت نشده"]
      - id: service_request
        name: "Service Request"
        definition: >
          کاربر یک قابلیت جدید، دسترسی، یا چیزی که تا کنون وجود نداشته را درخواست می‌کند.
        cues: [دسترسی, access, "ایجاد گردد", "فعال‌سازی", "آزاد کردن", درخواست, "نیاز دارم", request]

  # -------------------------------------------------------------------------
  - id: layer2
    name: "Domain / حوزه"
    role: domain
    description: >
      حوزه یا اپلیکیشن مربوط به تیکت را مشخص می‌کند؛ مستقل از اینکه مشکل (Incident)
      است یا درخواست (Service Request).
    labels:
      - id: erp
        name: "ERP"
        definition: >
          مسائل مربوط به مدیریت پرسنل، حقوق و دستمزد، حضور و غیاب، ارزیابی عملکرد،
          و مدیریت اطلاعات پرسنل.
        cues:
          - "تایم‌شیت"
          - "تایم شیت"
          - timesheet
          - "فیش حقوقی"
          - "عنوان شغلی"
          - "ورود و خروج"
          - "ورود خروج"
          - پانچ
          - punch
          - "حضور و غیاب"
          - "manager summary"
      - id: staff
        name: "Staff"
        definition: >
          فعال/غیرفعال‌کردن و پیکربندی ماژول‌ها مانند وام، ارزیابی، و جبران خدمات.
        cues:
          - وام
          - loan
          - "وام کوتاه مدت"
          - "وام بلند مدت"
          - "ماژول وام"
          - "سقف ضمانت"
          - "حق عضویت"
          - "جبران خدمات"
          - ضامن

# ============================================================================
#  نکته دربارهٔ ابهام ذاتی:
#  کلمهٔ «ارزیابی» عمداً در cues هیچ‌کدام نیست، چون هم در ERP (ارزیابی عملکرد)
#  و هم در Staff (ماژول ارزیابی) معنا دارد. این یک منطقهٔ ابهام واقعی است که
#  باید با سوال تکمیلی حل شود، نه با کلیدواژه.
# ============================================================================
