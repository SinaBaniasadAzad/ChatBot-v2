# ============================================================================
#  Taxonomy — تعریف دسته‌ها (منبع واحد حقیقت)
# ----------------------------------------------------------------------------
#  افزودن دستهٔ جدید = افزودن یک بلوک label اینجا. هیچ تغییری در کد لازم نیست.
#
#  هر «layer» یک بُعد دسته‌بندی است. هر «label» یک گزینه در آن بُعد.
#  - id    : slug پایدار و یکتا (مدل همین را برمی‌گرداند، نه نام نمایشی)
#  - name  : نام نمایشی
#  - definition : تعریف دقیق (به مدل تزریق می‌شود)
#  - cues  : کلمات/عبارات نشانه‌ای (فارسی و انگلیسی). فقط «راهنما» هستند، نه قانون قطعی.
# ============================================================================

meta:
  languages: [fa, en]
  notes: "Layer ids are JSON keys in the model output. Label ids are stable slugs."

layers:
  # -------------------------------------------------------------------------
  - id: layer1
    name: "Type / نوع درخواست"
    role: intent
    description: >
      قصدِ کاربر را مشخص می‌کند، مستقل از حوزه (Domain).
      برای انتخاب بین Incident و Service Request به «قصد» نگاه کن، نه ادبِ کلمات:
        • Incident = چیزی که باید کار کند خراب/مختل شده و باید به حالت عادی برگردد
          (خطا، پیام خطا، قطعی، کرش، نتیجهٔ نادرست، یا عملکردی که قبلاً بود و حالا نیست).
        • Service Request = درخواستِ فراهم‌کردن/اعطا/ایجاد/فعال‌سازی/پیکربندیِ چیزی
          (دسترسی، حساب، نقش، مجوز، فعال/غیرفعال‌کردن قابلیت، افزایش سقف، یا ارائهٔ اطلاعات)
          که کاربر تا کنون نداشته؛ هیچ‌چیز خراب نشده.
      کلماتی مثل «مشکل»، «نمی‌توانم»، «امکان‌پذیر نیست» به‌تنهایی تعیین‌کننده نیستند و ممکن
      است در هر دو بیایند. آزمونِ تصمیم: آیا چیزی خراب شده که باید «تعمیر» شود (Incident)،
      یا چیزی باید «فراهم/اعطا» شود (Service Request)؟ اگر کاربر هم از خطا می‌گوید و هم
      چیزی می‌خواهد، برچسب را بر اساسِ «خواستهٔ اصلیِ» تیکت انتخاب کن.
    labels:
      - id: incident
        name: "Incident"
        definition: >
          اختلال در سرویسی که باید کار کند: خطا/پیام خطا، کرش، قطعی، نتیجهٔ نادرست، یا
          چیزی که قبلاً درست کار می‌کرد و حالا از کار افتاده. کاربر می‌خواهد عملکردِ
          خراب‌شده به حالت عادی برگردد. صرفِ وجودِ «مشکل» یا «نمی‌توانم» کافی نیست؛ باید
          یک خرابی/خطای واقعی در عملکرد باشد. اگر کاربر چیزی *جدید* (دسترسی/حساب/نقش/
          فعال‌سازی) می‌خواهد که تا کنون نداشته، این Incident نیست بلکه Service Request است.
        cues:
          - "خطا می‌دهد"
          - "خطا می‌گیرم"
          - خطا
          - error
          - "پیام خطا"
          - کرش
          - crash
          - "از کار افتاد"
          - "کار نمی‌کند"
          - "قطع شد"
          - قطعی
          - "بالا نمی‌آید"
          - "لود نمی‌شود"
          - "نمایش نمی‌دهد"
          - "به درستی ثبت نشده"
          - "ثبت نمی‌شود"
          - "اشتباه محاسبه"
          - ناموفق
          - failed
      - id: service_request
        name: "Service Request"
        definition: >
          درخواست برای فراهم‌کردن، اعطا، ایجاد، فعال‌سازی، یا پیکربندیِ چیزی — مانند
          دسترسی، حساب کاربری، نقش، مجوز، فعال/غیرفعال‌کردن یک قابلیت/ماژول، افزایش
          سقف/حد، یا ارائهٔ اطلاعات. هیچ‌چیز خراب نیست؛ کاربر می‌خواهد چیزی داده/راه‌اندازی/
          تنظیم شود. آزمونِ کلیدی: اگر این قابلیت برای این کاربر هرگز فراهم نبوده و حالا
          درخواست می‌شود، Service Request است — حتی اگر کاربر بنویسد «نمی‌توانم» یا «مشکل دارم».
        cues:
          - دسترسی
          - access
          - "ایجاد گردد"
          - "ایجاد شود"
          - "ایجاد کنید"
          - اعطا
          - "تعریف گردد"
          - "تعریف شود"
          - "اضافه گردد"
          - "اضافه شود"
          - "فعال‌سازی"
          - "فعال شود"
          - "فعال گردد"
          - غیرفعال
          - "آزاد کردن"
          - "آزاد شود"
          - "افزایش سقف"
          - تخصیص
          - "راه‌اندازی"
          - درخواست
          - "نیاز دارم"
          - "نیاز است"
          - request
          - grant
          - create
          - enable

  # -------------------------------------------------------------------------
  - id: layer2
    name: "Domain / حوزه"
    role: domain
    description: >
      حوزه یا اپلیکیشن مربوط به تیکت را مشخص می‌کند؛ مستقل از اینکه مشکل (Incident)
      است یا درخواست (Service Request).
    labels:
      - id: erp
        name: "ERP"
        definition: >
          مسائل مربوط به مدیریت پرسنل، حقوق و دستمزد، حضور و غیاب، ارزیابی عملکرد،
          و مدیریت اطلاعات پرسنل.
        cues:
          - "تایم‌شیت"
          - "تایم شیت"
          - timesheet
          - "فیش حقوقی"
          - "عنوان شغلی"
          - "ورود و خروج"
          - "ورود خروج"
          - پانچ
          - punch
          - "حضور و غیاب"
          - "manager summary"
      - id: staff
        name: "Staff"
        definition: >
          فعال/غیرفعال‌کردن و پیکربندی ماژول‌ها مانند وام، ارزیابی، و جبران خدمات.
        cues:
          - وام
          - loan
          - "وام کوتاه مدت"
          - "وام بلند مدت"
          - "ماژول وام"
          - "سقف ضمانت"
          - "حق عضویت"
          - "جبران خدمات"
          - ضامن

# ============================================================================
#  نقشهٔ سیگنالِ متخصص (کلیدواژه → حوزه + نوع، همراه با اولویت)
#  هر کلیدواژه «هم‌زمان» حوزه و نوع را می‌گوید. عدد = قدرت/اولویتِ سیگنال
#  (هرچه بزرگ‌تر، تعیین‌کننده‌تر؛ هنگام تعارضِ دو کلیدواژه، بزرگ‌تر برنده است).
# ============================================================================
signals:
  domain_type:
    - domain: erp
      type: service_request
      keywords: [["فیش حقوقی", 3], ["عنوان شغلی", 4], ["پایه سنوات", 2], ["تایم شیت اپرور", 1]]
    - domain: erp
      type: incident
      keywords: [["ورود خروج", 1], ["تایم شیت", 1], ["پانچ", 1], ["Punch", 1], ["دستگاه حضور غیاب", 1], ["Gate", 1], ["گیت", 1]]
    - domain: staff
      type: incident
      keywords: [["وام کوتاه مدت", 1], ["وام بلند مدت", 1], ["دکمه اپرو", 2]]
    - domain: staff
      type: service_request
      keywords: [["گزینه Loan", 1], ["سقف ضمانت", 2], ["ماژول وام", 1], ["حق عضویت", 1], ["صندوق اینترنال", 5], ["صندوق اکسترنال", 5], ["category", 3], ["درخواست وام", 4]]
  type_general:
    - type: incident
      keywords: [["عدم ثبت", 1], ["غیبت", 1], ["کسر کار", 1]]
  rules:
    - "اگر جمله‌ای شاملِ «دسترسی» باشد و همراهِ آن یکی از {قطع، خطا، مشکل، عدم} یا یک فعلِ منفی بیاید، آن تیکت Incident است؛ در غیر این صورت «دسترسی» نشانهٔ Service Request است."

# ============================================================================
#  نکته دربارهٔ ابهام ذاتی:
#  کلمهٔ «ارزیابی» عمداً در cues هیچ‌کدام نیست، چون هم در ERP (ارزیابی عملکرد)
#  و هم در Staff (ماژول ارزیابی) معنا دارد. این یک منطقهٔ ابهام واقعی است که
#  باید با سوال تکمیلی حل شود، نه با کلیدواژه.
# ============================================================================
